<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>holoVault</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#a855f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="holoVault">
<link rel="icon" href="favicon.ico">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: rgba(18,14,32,0.92);
    --border: rgba(147,51,234,0.22);
    --purple: #a855f7;
    --text: #e8e0f0;
    --text-muted: rgba(200,180,240,0.55);
    --text-faint: rgba(200,180,240,0.3);
    --green: #34d399;
    --gold: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    user-select: none; -webkit-user-select: none;
  }
  input, textarea { user-select: text; -webkit-user-select: text; }

  /* ── Stars background ── */
  #stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .star {
    position: absolute; border-radius: 50%; background: white;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }

  /* ── Glow orbs ── */
  #glow {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(147,51,234,0.14) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(236,72,153,0.11) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 60% 10%, rgba(59,130,246,0.07) 0%, transparent 50%);
  }

  /* ── Layout ── */
  #app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; }

  /* ── Header ── */
  header {
    display: flex; align-items: flex-end; gap: 16px;
    padding: 16px 20px 0;
    background: rgba(10,10,20,0.95);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; z-index: 20;
  }
  .header-brand { flex: 1; padding-bottom: 14px; }
  .header-brand h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.75rem; font-weight: 900; letter-spacing: -0.03em;
    display: flex; align-items: center; gap: 0px; margin-bottom: 3px;
    line-height: 1;
  }
  .logo-holo {
    background: linear-gradient(135deg, #ff6eb4, #a855f7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .logo-vault {
    background: linear-gradient(135deg, #a855f7, #22d3ee);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header-brand p { font-size: 0.72rem; color: var(--text-faint); }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 3px; }
  .tab {
    padding: 8px 15px; border-radius: 8px 8px 0 0;
    border: none; border-top: 2px solid transparent;
    background: transparent; color: var(--text-muted);
    font-size: 0.8rem; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active {
    background: rgba(147,51,234,0.28);
    color: #e2d9ff;
    border-top-color: var(--purple);
  }
  .tab:hover:not(.active) { background: rgba(147,51,234,0.1); }

  /* ── Data buttons ── */
  .data-btns { display: flex; gap: 6px; padding: 10px 10px 14px; margin-top: auto; }
  .data-btn {
    flex: 1; padding: 6px 0; border-radius: 6px; text-align: center;
    border: 1px solid rgba(147,51,234,0.3);
    background: rgba(28,18,48,0.6); color: var(--text-muted);
    font-size: 0.72rem; cursor: pointer; transition: all 0.15s;
  }
  .data-btn:hover { background: rgba(147,51,234,0.2); color: var(--text); }

  /* ── Body ── */
  #body { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: 210px; flex-shrink: 0;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    overflow-y: auto; padding: 14px 10px;
    background: rgba(10,10,20,0.92);
    transition: width 0.3s ease, padding 0.3s ease, opacity 0.25s ease;
  }
  #sidebar.collapsed { width: 0; min-width: 0; padding: 0; opacity: 0; overflow: hidden; border-right: none; pointer-events: none; }
  .sidebar-label {
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em;
    color: var(--text-faint); margin-bottom: 8px; padding-left: 4px; text-transform: uppercase;
  }
  .branch-label {
    font-size: 0.65rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--purple); padding: 10px 6px 3px; margin-top: 4px;
    border-top: 1px solid rgba(147,51,234,0.2);
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    border-radius: 4px; transition: background 0.12s;
  }
  .branch-label:first-child { border-top: none; padding-top: 2px; }
  .branch-label:hover { background: rgba(147,51,234,0.1); }
  .branch-chevron {
    font-size: 0.6rem; transition: transform 0.2s; display: inline-block; color: var(--purple);
  }
  .branch-label.collapsed .branch-chevron { transform: rotate(-90deg); }
  .branch-members { overflow: hidden; transition: max-height 0.3s ease, opacity 0.25s ease; max-height: 2000px; opacity: 1; }
  .branch-members.collapsed { max-height: 0; opacity: 0; }
  .gen-label {
    font-size: 0.58rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-faint); padding: 5px 4px 2px; margin-top: 2px;
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    border-radius: 4px; transition: background 0.12s;
  }
  .gen-label:hover { background: rgba(147,51,234,0.08); }
  .gen-chevron {
    font-size: 0.55rem; transition: transform 0.2s; display: inline-block;
    color: var(--text-faint);
  }
  .gen-label.collapsed .gen-chevron { transform: rotate(-90deg); }
  .gen-members {
    overflow: hidden;
    transition: max-height 0.25s ease, opacity 0.2s ease;
    max-height: 500px; opacity: 1;
  }
  .gen-members.collapsed { max-height: 0; opacity: 0; }
  .talent-btn {
    width: 100%; text-align: left; padding: 4px 8px; border-radius: 5px;
    border: none; background: transparent; color: var(--text-muted);
    font-size: 0.73rem; cursor: pointer; display: flex; align-items: center; gap: 6px;
    margin-bottom: 1px; transition: all 0.12s;
  }
  .talent-btn:hover { background: rgba(147,51,234,0.12); }
  .talent-btn.active { font-weight: 600; }
  .talent-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .all-btn {
    width: 100%; text-align: left; padding: 6px 10px; border-radius: 6px;
    border: none; background: transparent; color: var(--text-muted);
    font-size: 0.77rem; cursor: pointer; margin-bottom: 8px; transition: all 0.12s;
  }
  .all-btn.active { background: rgba(147,51,234,0.28); color: #e2d9ff; }
  .all-btn:hover:not(.active) { background: rgba(147,51,234,0.1); }

  /* ── Main ── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Filter bar ── */
  #filterbar {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    padding: 10px 16px;
    background: rgba(10,10,20,0.92);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; z-index: 10;
  }
  #filterbar input, #filterbar select {
    padding: 6px 12px; border-radius: 7px;
    border: 1px solid rgba(147,51,234,0.3);
    background: rgba(28,18,48,0.85); color: var(--text);
    font-size: 0.8rem; outline: none;
    transition: border-color 0.15s;
  }
  #filterbar input { flex: 1; min-width: 140px; }
  #filterbar input:focus, #filterbar select:focus { border-color: var(--purple); }
  #filterbar select { cursor: pointer; }
  #result-count { font-size: 0.72rem; color: var(--text-faint); white-space: nowrap; margin-left: auto; }

  /* ── Grid ── */
  #grid-container { flex: 1; overflow-y: auto; padding: 20px; }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 18px;
  }

  /* ── Card ── */
  .card {
    border-radius: 14px; overflow: hidden; cursor: pointer;
    background: linear-gradient(145deg, rgba(20,14,36,0.95), rgba(14,9,28,0.97));
    display: flex; flex-direction: column;
    transition: transform 0.25s ease, box-shadow 0.3s ease;
    content-visibility: auto;
    contain-intrinsic-size: auto 450px;
  }
  .card:hover {
    transform: translateY(-4px) scale(1.012);
    box-shadow: 0 20px 50px rgba(147,51,234,0.25), 0 0 0 1px rgba(147,51,234,0.2);
  }
  #grid.animate .card { animation: cardIn 0.25s ease both; }
  .card-img-wrap {
    position: relative; padding-top: 100%;
    background: rgba(10,8,20,0.8);
  }
  .card-img-wrap img {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  }
  .card-no-img {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center; font-size: 38px;
  }
  .sold-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 800; letter-spacing: 0.1em; color: var(--red);
  }
  .card-badges { position: absolute; top: 6px; left: 6px; display: flex; flex-direction: column; gap: 4px; }
  .card-actions {
    position: absolute; top: 6px; right: 6px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .action-btn {
    width: 27px; height: 27px; border-radius: 7px; border: none; cursor: pointer;
    font-size: 13px; display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s, background 0.15s;
  }
  .action-btn:hover { transform: scale(1.12); }
  .action-btn:active { transform: scale(0.9); }
  .action-btn.wishlist-off { background: rgba(10,10,20,0.78); color: var(--gold); }
  .action-btn.wishlist-on  { background: rgba(251,191,36,0.88); color: #1a1200; }
  .action-btn.owned-off   { background: rgba(10,10,20,0.78); color: var(--green); }
  .action-btn.owned-on    { background: rgba(52,211,153,0.88); color: #012a18; }

  .card-info { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .card-title {
    font-size: 1.05rem; font-weight: 600; line-height: 1.4; color: #ddd6fe;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-talents { display: flex; flex-wrap: wrap; gap: 4px; }
  .talent-tag {
    font-size: 0.78rem; padding: 3px 10px; border-radius: 999px; font-weight: 600;
  }
  .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
  .card-price { display: flex; flex-direction: column; gap: 0px; }
  .card-price-jpy { font-size: 1.05rem; font-weight: 700; color: #c084fc; line-height: 1.2; }
  .card-price-usd { font-size: 0.72rem; color: var(--text-muted); line-height: 1.2; }
  .card-price-extra { color: rgba(192,132,252,0.5); font-weight: 400; }

  .modal-price-jpy { font-size: 1.4rem; font-weight: 700; color: #c084fc; }
  .modal-price-usd { font-size: 0.9rem; color: var(--text-muted); margin-left: 8px; }

  /* ── Drop timer (card) ── */
  .drop-timer {
    display: flex; flex-direction: column; gap: 4px;
    padding-top: 7px; border-top: 1px solid rgba(147,51,234,0.12); margin-top: 4px;
  }
  .drop-timer-label {
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-faint); display: flex; align-items: center; gap: 4px;
  }
  .drop-timer-icon { opacity: 0.7; }
  .timer-live {
    display: flex; align-items: baseline; gap: 2px; flex-wrap: wrap;
  }
  .timer-live .tv { font-size: 0.88rem; font-weight: 700; color: #c084fc; font-variant-numeric: tabular-nums; }
  .timer-live .tl { font-size: 0.62rem; color: var(--text-faint); text-transform: uppercase; margin-right: 4px; }
  .timer-days {
    font-size: 0.82rem; color: var(--text);
  }
  .timer-days b { color: #c084fc; font-weight: 700; }

  /* ── Drop timer (modal) ── */
  .modal-drop-timer {
    display: flex; flex-direction: column; gap: 8px;
    padding: 12px 16px; margin-bottom: 14px;
    background: rgba(147,51,234,0.08); border: 1px solid rgba(147,51,234,0.2); border-radius: 10px;
  }
  .modal-drop-label {
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-faint);
  }
  .modal-tsegs { display: flex; gap: 5px; align-items: center; }
  .modal-tseg {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(147,51,234,0.15); border: 1px solid rgba(147,51,234,0.28);
    border-radius: 8px; padding: 6px 10px; min-width: 48px;
  }
  .modal-tseg .tseg-val { font-size: 1.3rem; font-weight: 700; color: #c084fc; line-height: 1.1; font-variant-numeric: tabular-nums; }
  .modal-tseg .tseg-lbl { font-size: 0.56rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
  .modal-tsep { color: rgba(147,51,234,0.5); font-size: 1.2rem; margin-bottom: 14px; font-weight: 700; }
  .modal-timer-days {
    font-size: 0.95rem; color: var(--text);
  }
  .modal-timer-days b { color: #c084fc; font-weight: 700; }

  /* ── Badges ── */
  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 999px;
    font-size: 0.72rem; font-weight: 700; border: 1px solid;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .badge-status-available  { background: rgba(52,211,153,0.18);  color: #34d399; border-color: rgba(52,211,153,0.3); }
  .badge-status-soldout    { background: rgba(239,68,68,0.18);   color: #f87171; border-color: rgba(239,68,68,0.3); }
  .badge-status-comingsoon { background: rgba(80,60,10,0.82);  color: #ffe082; border-color: rgba(251,191,36,0.7); }
  .badge-status-preorder   { background: rgba(60,20,100,0.82); color: #d8aaff; border-color: rgba(168,85,247,0.7); }
  .badge-status-delisted   { background: rgba(100,100,120,0.18); color: #9ca3af; border-color: rgba(156,163,175,0.3); }
  .badge-type  { background: rgba(96,165,250,0.45); color: #bae0ff; border-color: rgba(147,197,253,0.7); }

  /* ── Loading / empty ── */
  #loading-state, #empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    color: var(--text-muted);
  }
  .spinner {
    width: 46px; height: 46px; border-radius: 50%;
    border: 3px solid rgba(147,51,234,0.2); border-top-color: var(--purple);
    animation: spin 0.8s linear infinite;
  }

  /* ── Modal ── */
  #modal-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(5,3,15,0.93);
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  #modal-overlay.hidden { display: none; }
  #modal {
    background: linear-gradient(135deg, #12101e, #1a1230);
    border: 1px solid rgba(147,51,234,0.36);
    border-radius: 15px; width: 100%; max-width: 510px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7); overflow: hidden;
    animation: fadeIn 0.22s ease;
  }
  #modal-img-wrap { position: relative; overflow: hidden; }
  #modal-img-wrap img { width: 100%; height: auto; display: block; pointer-events: none; }
  .modal-img-fade { pointer-events: none;
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 45%, #12101e);
  }
  .modal-img-badges { position: absolute; top: 10px; right: 10px; display: flex; gap: 6px; }
  .gallery-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(10,8,20,0.65); border: 1px solid rgba(147,51,234,0.4);
    color: #c084fc; font-size: 1.6rem; line-height: 1;
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s, opacity 0.15s;
    z-index: 5; padding: 0;
  }
  .gallery-arrow:hover { background: rgba(147,51,234,0.5); }
  .gallery-arrow:disabled { opacity: 0.2; pointer-events: none; }
  .gallery-prev { left: 10px; }
  .gallery-next { right: 10px; }
  #gallery-dots {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 5px; z-index: 5;
  }
  .gallery-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.3); border: none; padding: 0; cursor: pointer;
    transition: background 0.15s, transform 0.15s;
  }
  .gallery-dot.active { background: #c084fc; transform: scale(1.3); }
  #modal-body { padding: 20px 22px 22px; }
  #modal-title { font-size: 1.05rem; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
  #modal-talents { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .modal-talent-tag {
    padding: 3px 10px; border-radius: 999px; font-size: 0.7rem; font-weight: 600;
    border: 1px solid; border-color: rgba(255,255,255,0.1);
  }
  #modal-price { font-size: 1.2rem; font-weight: 800; color: #c084fc; margin-bottom: 16px; }
  #modal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .modal-shop-btn {
    flex: 1; padding: 9px 14px; border-radius: 8px; text-align: center;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white; text-decoration: none; font-size: 0.83rem; font-weight: 700;
    transition: opacity 0.15s;
  }
  .modal-shop-btn:hover { opacity: 0.88; }
  .modal-action-btn {
    padding: 9px 13px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
    cursor: pointer; transition: background 0.15s, transform 0.1s; border: 1px solid;
  }
  .modal-action-btn:active { transform: scale(0.96); }
  .modal-wishlist-off { background: transparent; color: var(--gold); border-color: rgba(251,191,36,0.4); }
  .modal-wishlist-on  { background: rgba(251,191,36,0.2); color: var(--gold); border-color: rgba(251,191,36,0.4); }
  .modal-owned-off { background: transparent; color: var(--green); border-color: rgba(52,211,153,0.35); }
  .modal-owned-on  { background: rgba(52,211,153,0.2); color: var(--green); border-color: rgba(52,211,153,0.35); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    padding: 9px 20px; border-radius: 999px; z-index: 100;
    background: rgba(140,48,230,0.95);
    color: white; font-size: 0.83rem; font-weight: 600;
    box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    animation: toastIn 0.28s ease;
    pointer-events: none;
  }
  #toast.hidden { display: none; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(147,51,234,0.35); border-radius: 3px; }

  /* ── Animations ── */
  @keyframes twinkle { 0%,100%{opacity:0.08} 50%{opacity:0.75} }
  @keyframes fadeIn  { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
  @keyframes cardIn  { from{opacity:0;transform:translateY(20px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes spin    { to{transform:rotate(360deg)} }
  @keyframes toastIn { from{opacity:0;transform:translate(-50%,16px)} to{opacity:1;transform:translate(-50%,0)} }

  /* ── Lightbox ── */
  #lightbox {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.96);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.18s ease;
    cursor: zoom-out;
  }
  #lightbox.hidden { display: none; }
  #lightbox img {
    max-width: 92vw; max-height: 92vh;
    object-fit: contain; border-radius: 6px;
    box-shadow: 0 0 80px rgba(0,0,0,0.8);
    cursor: default;
  }
  #lightbox-close {
    position: absolute; top: 18px; right: 22px;
    background: rgba(18,14,32,0.8); border: 1px solid rgba(147,51,234,0.4);
    color: #c084fc; font-size: 1.3rem; width: 38px; height: 38px;
    border-radius: 50%; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: background 0.15s;
  }
  #lightbox-close:hover { background: rgba(147,51,234,0.5); }

  /* ── Sidebar toggle ── */
  .sidebar-toggle-btn {

    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(147,51,234,0.4);

  .density-group { display: flex; gap: 3px; align-items: center; }

  #grid.compact { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }

  }

<div id="app">

    </div>

    <!-- Main -->
    <div id="main">
      <!-- Filters -->
      <div id="filterbar">
        <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="Toggle talent filter">☰</button>
        <input type="text" id="search" placeholder="Search merch…" oninput="debouncedRender()" />
        <select id="filter-branch" onchange="render()">

        <select id="filter-type" onchange="render()">

          <option>Birthday</option>
          <option>Anniversary</option>
          <option>Voice Pack</option>
          <option>Music</option>
          <option>Figure</option>
          <option>Plush</option>
          <option>Costume</option>
          <option>Acrylic</option>
          <option>Tapestry</option>
          <option>Keychain</option>
          <option>Card Game</option>
          <option>Collab</option>
          <option>Digital</option>
          <option>General</option>
        </select>
        <select id="filter-status" onchange="render()">
          <option value="All">All Status</option>
          <option>Available</option>
          <option>Sold Out</option>
          <option>Delisted</option>
        </select>
        <select id="sort-by" onchange="render()">
          <option value="newest">Newest First</option>
          <option value="name">Name A–Z</option>
          <option value="price-asc">Price ↑</option>
          <option value="price-desc">Price ↓</option>
        </select>
        <div class="density-group">
          <button class="density-btn active" data-density="normal" onclick="setDensity('normal')" title="Normal view">▦</button>

        </div>
        <span id="result-count">—</span>
      </div>

      <div id="grid-container">

const _talentAliasMap = new Map();
const _talentTitleEntries = [];
{
  const seen = new Set();
  for (const t of TALENTS) {
    for (const a of (t.aliases || [])) {
      const key = a.toLowerCase();
      if (!_talentAliasMap.has(key)) _talentAliasMap.set(key, []);
      _talentAliasMap.get(key).push(t);
    }
    if (!seen.has(t.id)) {
      seen.add(t.id);
      _talentTitleEntries.push({ ref: t, nameLower: t.name.toLowerCase(), aliasesLower: (t.aliases || []).map(a => a.toLowerCase()) });
    }
  }
}

function safeUrl(url) {
  try { const u = new URL(url); return /^https?:$/.test(u.protocol) ? url : ''; }
  catch { return ''; }
}

const _tagTextCache = new Map();
function tagTextColor(hex) {
  let v = _tagTextCache.get(hex);
  if (v) return v;
  const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  v = (r * 299 + g * 587 + b * 114) / 1000 > 110 ? hex
    : '#' + [r,g,b].map(c => Math.round(c + (255 - c) * 0.55).toString(16).padStart(2, '0')).join('');
  _tagTextCache.set(hex, v);
  return v;
}

function inferMerchType(title, tags) {
  const t = (title + ' ' + tags.join(' ')).toLowerCase();
  // Birthday must come before Anniversary since some titles contain both "誕生日" and "記念"
  if (t.includes('birthday') || t.includes('誕生日')) return 'Birthday';
  if (t.includes('anniversary') || (t.includes('周年') && !t.includes('誕生日'))) return 'Anniversary';
  // Voice / audio content
  if (t.includes('voice pack') || t.includes('asmr') || t.includes('ボイス')) return 'Voice Pack';
  // Music releases
  if (t.includes(' ep ') || t.includes('1st ep') || t.includes('album') || tags.includes('CD')) return 'Music';
  // Figures
  if (t.includes('nendoroid') || t.includes('figma') || t.includes('figure') || t.includes('フィギュア')) return 'Figure';
  // Plush / stuffed toys
  if (t.includes('plush') || t.includes('stuffed') || t.includes('ぬいぐるみ') || t.includes('nuigurumi')) return 'Plush';
  // Costume / outfit (only explicit costume references, not general clothing)
  if (t.includes('costume') || t.includes('衣装') || /\b2nd costume\b|\b3rd costume\b/.test(t)) return 'Costume';
  // Acrylic goods
  if (t.includes('acrylic') || t.includes('アクリル')) return 'Acrylic';
  // Tapestry
  if (t.includes('tapestry') || t.includes('タペストリー')) return 'Tapestry';
  // Keychain / charm
  if (t.includes('keychain') || t.includes('charm') || t.includes('キーホルダー')) return 'Keychain';
  // Card game
  if (t.includes('card game') || t.includes('holocard') || tags.includes('hololiveofficialcardgame')) return 'Card Game';
  // Collab
  if (t.includes('collab') || t.includes('collaboration') || t.includes('コラボ')) return 'Collab';
  // Digital-only content
  if (tags.includes('デジタルのみ') || tags.includes('デジタルコンテンツ')) return 'Digital';
  return 'General';
}

const _SEP = /[\s,\-\/\|「」【】『』（）()・]/;
function _hasWholePhrase(haystack, phrase) {
  const idx = haystack.indexOf(phrase);
  if (idx === -1) return false;
  const before = idx === 0 ? '' : haystack[idx - 1];
  const after  = haystack[idx + phrase.length] ?? '';
  return (!before || _SEP.test(before)) && (!after || _SEP.test(after));
}

function matchTalents(title, tags) {
  const matched = new Map();
  for (const tag of tags) {
    const hits = _talentAliasMap.get(tag.toLowerCase());
    if (hits) for (const t of hits) if (!matched.has(t.id)) matched.set(t.id, t);
  }
  const titleLower = title.toLowerCase();
  for (const e of _talentTitleEntries) {
    if (matched.has(e.ref.id)) continue;
    if (_hasWholePhrase(titleLower, e.nameLower) ||
        e.aliasesLower.some(a => _hasWholePhrase(titleLower, a))) {
      matched.set(e.ref.id, e.ref);
    }
  }
  return [...matched.values()];
}

// ── Exchange rate ─────────────────────────────────────────────────────────────
let usdPerJpy = null; // will be fetched on load

async function fetchExchangeRate() {
  try {
    // Free, no-key exchange rate API
    const res = await fetch('https://open.er-api.com/v6/latest/JPY');
    if (!res.ok) throw new Error();
    const data = await res.json();
    usdPerJpy = data.rates?.USD ?? null;
  } catch {
    // Fallback: approximate rate if API fails
    usdPerJpy = 0.0067;
  }
}

function jpyToUsd(yen) {
  if (!usdPerJpy || !yen) return null;
  return yen * usdPerJpy;
}

function fmtJpy(yen) {
  return '¥' + Math.round(yen).toLocaleString();
}

function fmtUsd(yen) {
  const usd = jpyToUsd(yen);
  if (usd === null) return '';
  return '$' + usd.toFixed(2);
}

async function loadProducts() {
  document.getElementById('load-progress').textContent = 'Loading…';

  try {
    const [, res] = await Promise.all([fetchExchangeRate(), fetch(ARCHIVE_URL)]);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const archive = await res.json();

    // Map archive JSON fields to the shape the rest of the UI expects
    allProducts = archive.map(p => {
      const mergedTags = [...new Set([...(p.tags_jp || []), ...(p.tags_en || [])])];
      const titleEn    = p.title_en || p.title_jp || '';
      return {
        id:           p.product_id,
        handle:       p.handle,
        title:        p.title_jp || titleEn,
        titleEn,
        type:         inferMerchType(titleEn, mergedTags),
        tags:         mergedTags,
        images:       p.images || [],
        image:        (p.images && p.images[0]) || null,
        url:          `https://shop.hololivepro.com/en/products/${p.handle}`,
        available:    p.is_available,
        status:       p.delisted_at  ? 'Delisted'
                    : p.is_available ? 'Available'
                    :                  'Sold Out',
        delisted_at:  p.delisted_at  || null,
        minPrice:     p.min_price    || 0,
        maxPrice:     p.max_price    || 0,
        talents:      matchTalents(titleEn, mergedTags),
        publishedAt:  p.published_at || '',
        _sortTs:      p.published_at ? new Date(p.published_at).getTime() : 0,
        _search:      ((p.title_jp || '') + ' ' + titleEn + ' ' + mergedTags.join(' ')).toLowerCase(),
      };
    });

    // Build O(1) lookup map
    productMap = new Map(allProducts.map(p => [p.id, p]));

  } catch (e) {
    document.getElementById('loading-state').innerHTML = `
      <span style="font-size:2.5rem">⚠️</span>
      <div style="font-weight:700;font-size:0.95rem">Could not load archive</div>

    `;
    return;
  }

  document.getElementById('header-subtitle').textContent =

  document.getElementById('loading-state').style.display = 'none';
  render();
}

  syncSets();

async function saveUserData() {

  syncSets();
}

function updateTabCounts() {
  document.getElementById('wl-count').textContent = userData.wishlist.length;
  document.getElementById('ow-count').textContent = userData.owned.length;

function exportUserData() {
  const blob = new Blob([JSON.stringify(userData, null, 2)], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'holovault-backup.txt';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Exported wishlist & owned data');
}

function importUserData(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 1024 * 1024) { showToast('File too large'); input.value = ''; return; }

  const reader = new FileReader();
  reader.onload = () => {
    input.value = '';
    let parsed;
    try { parsed = JSON.parse(reader.result); } catch { showToast('Invalid file format'); return; }

    if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
      showToast('Invalid file format'); return;
    }

    const wl = parsed.wishlist;
    const ow = parsed.owned;
    if (!Array.isArray(wl) || !Array.isArray(ow)) { showToast('Invalid data structure'); return; }

    const validIds = new Set(allProducts.map(p => p.id));
    const cleanWl = [...new Set(wl.filter(id => typeof id === 'string' && validIds.has(id)))];
    const cleanOw = [...new Set(ow.filter(id => typeof id === 'string' && validIds.has(id)))];

    userData.wishlist = cleanWl;
    userData.owned = cleanOw;
    saveUserData();
    updateTabCounts();
    render();
    showToast(`Imported ${cleanWl.length} wishlist, ${cleanOw.length} owned`);
  };
  reader.readAsText(file);
}

// ── Filtering & rendering ─────────────────────────────────────────────────────
function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const branch = document.getElementById('filter-branch').value;
  const type   = document.getElementById('filter-type').value;
  const status = document.getElementById('filter-status').value;
  const sort   = document.getElementById('sort-by').value;

  let list = allProducts.filter(p => {
    if (search && !p._search.includes(search)) return false;
    if (branch !== 'All') {
      if (!p.talents.some(t => t.branch === branch)) return false;
    }
    if (type !== 'All Types' && p.type !== type) return false;
    // Delisted items only appear when explicitly filtering for them
    if (status === 'Delisted') {
      if (p.status !== 'Delisted') return false;
    } else if (status !== 'All') {
      if (p.status !== status) return false;
    } else {
      // Default "All" view hides delisted — use Delisted filter to see them
      if (p.status === 'Delisted') return false;
    }
    if (activeTalent && !p.talents.some(t => t.id === activeTalent)) return false;
    if (activeTab === 'wishlist' && !wishlistSet.has(p.id)) return false;
    if (activeTab === 'owned'    && !ownedSet.has(p.id))    return false;
    return true;
  });

  list.sort((a, b) => {
    if (sort === 'newest')     return b._sortTs - a._sortTs;
    if (sort === 'name')       return a.title.localeCompare(b.title);
    if (sort === 'price-asc')  return a.minPrice - b.minPrice;
    if (sort === 'price-desc') return b.minPrice - a.minPrice;
    return 0;
  });

  return list;
}

function statusBadgeClass(status) {
  if (status === 'Available')   return 'badge-status-available';
  if (status === 'Sold Out')    return 'badge-status-soldout';
  if (status === 'Coming Soon') return 'badge-status-comingsoon';
  if (status === 'Pre-order')   return 'badge-status-preorder';
  if (status === 'Delisted')    return 'badge-status-delisted';
  return 'badge-status-available';
}

function cardHTML(p) {
  const inWL  = wishlistSet.has(p.id);
  const inOWN = ownedSet.has(p.id);
  const dominant   = p.talents[0];
  const borderColor = dominant ? dominant.color + '33' : 'rgba(147,51,234,0.2)';
  const talentTagsHTML = p.talents.slice(0,3).map(t =>
    `<span class="talent-tag" style="background:${esc(t.color)}30;color:${esc(tagTextColor(t.color))};border:1px solid ${esc(t.color)}66">${esc(t.name)}</span>`
  ).join('') + (p.talents.length > 3 ? `<span style="font-size:0.6rem;color:var(--text-faint)">+${p.talents.length-3}</span>` : '');

  const jpyMin = p.minPrice;
  const jpyMax = p.maxPrice;
  const hasRange = jpyMin !== jpyMax && jpyMax > 0;
  const priceHTML = jpyMin
    ? `<span class="card-price-jpy">${fmtJpy(jpyMin)}${hasRange ? '<span class="card-price-extra">+</span>' : ''}</span>` +
      (usdPerJpy ? `<span class="card-price-usd">${fmtUsd(jpyMin)}${hasRange ? '+' : ''}</span>` : '')
    : '<span class="card-price-jpy">—</span>';

  // Show correct overlay label based on status
  const overlayHTML = p.status === 'Delisted' ? '<div class="sold-overlay">DELISTED</div>'
                    : !p.available             ? '<div class="sold-overlay">SOLD OUT</div>'
                    : '';

  return `
  <div class="card" style="border:1px solid ${borderColor}" onclick="openModal('${esc(p.id)}')" data-dropped="${esc(p.publishedAt)}">
    <div class="card-img-wrap">
      ${p.image
        ? `<img src="${safeUrl(p.image)}" alt="" loading="lazy" />`
        : `<div class="card-no-img"></div>`
      }
      ${overlayHTML}
      <div class="card-badges">
        <span class="badge badge-type">${esc(p.type)}</span>
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="action-btn ${inWL ? 'wishlist-on' : 'wishlist-off'}"
          onclick="toggleWishlist('${esc(p.id)}')" title="Wishlist">★</button>
        <button class="action-btn ${inOWN ? 'owned-on' : 'owned-off'}"
          onclick="toggleOwned('${esc(p.id)}')" title="Owned">✓</button>
      </div>
    </div>
    <div class="card-info">
      <div class="card-title">${esc(p.titleEn)}</div>
      ${p.talents.length ? `<div class="card-talents">${talentTagsHTML}</div>` : ''}
      <div class="card-footer">
        <div class="card-price">${priceHTML}</div>
        <span class="badge ${statusBadgeClass(p.status)}">${esc(p.status)}</span>
      </div>
      ${p.publishedAt ? `<div class="drop-timer" data-ts="${p._sortTs}"><div class="drop-timer-label"><span class="drop-timer-icon">⏱</span>Time since release</div><div class="timer-inner"></div></div>` : ''}
    </div>
  </div>`;
}

const RENDER_BATCH = 60;
let _filtered = [];
let _rendered = 0;
let _firstRender = true;

function render() {
  _filtered = getFiltered();
  _rendered = 0;
  const grid  = document.getElementById('grid');
  const empty = document.getElementById('empty-state');

  document.getElementById('result-count').textContent =
    `${_filtered.length} item${_filtered.length !== 1 ? 's' : ''}`;

  if (_filtered.length === 0) {
    grid.style.display  = 'none';
    empty.style.display = 'flex';
    _timerEls = [];
    return;
  }

  empty.style.display = 'none';
  grid.style.display  = 'grid';
  grid.classList.toggle('animate', _firstRender);
  _firstRender = false;

  const batch = _filtered.slice(0, RENDER_BATCH);
  grid.innerHTML = batch.map(cardHTML).join('');
  _rendered = batch.length;
  _rebuildTimerCache();
}

function _loadMore() {
  if (_rendered >= _filtered.length) return;
  const grid = document.getElementById('grid');
  const batch = _filtered.slice(_rendered, _rendered + RENDER_BATCH);
  const tmp = document.createElement('div');
  tmp.innerHTML = batch.map(cardHTML).join('');
  const now = Date.now();
  tmp.querySelectorAll('.drop-timer[data-ts]').forEach(el => {
    const ts = +el.dataset.ts;
    const inner = el.querySelector('.timer-inner');
    if (!inner) return;
    inner.innerHTML = timerHTML(ts, false);
    if (now - ts < ONE_WEEK_MS) _timerEls.push({ ts, inner });
  });
  const frag = document.createDocumentFragment();
  while (tmp.firstChild) frag.appendChild(tmp.firstChild);
  grid.appendChild(frag);
  _rendered += batch.length;
}

function _rebuildTimerCache() {
  _timerEls = [];
  const now = Date.now();
  document.getElementById('grid').querySelectorAll('.drop-timer[data-ts]').forEach(el => {
    const ts = +el.dataset.ts;
    const inner = el.querySelector('.timer-inner');
    if (!inner) return;
    inner.innerHTML = timerHTML(ts, false);
    if (now - ts < ONE_WEEK_MS) _timerEls.push({ ts, inner });
  });
}

// ── Wishlist / owned ──────────────────────────────────────────────────────────
function toggleWishlist(id) {
  if (userData.wishlist.includes(id)) {
    userData.wishlist = userData.wishlist.filter(x => x !== id);
    showToast('Removed from wishlist');
  } else {
    userData.wishlist.push(id);
    userData.owned = userData.owned.filter(x => x !== id);
    showToast('Added to wishlist ✨');
  }
  saveUserData(); updateTabCounts(); render();
  if (modalProductId === id) refreshModalButtons();
}

function toggleOwned(id) {
  if (userData.owned.includes(id)) {
    userData.owned = userData.owned.filter(x => x !== id);
    showToast('Marked as not owned');
  } else {
    userData.owned.push(id);
    userData.wishlist = userData.wishlist.filter(x => x !== id);
    showToast('Marked as owned 🎉');
  }
  saveUserData(); updateTabCounts(); render();
  if (modalProductId === id) refreshModalButtons();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  const p = productMap.get(id);
  if (!p) return;
  modalProductId = id;

  const imgWrap = document.getElementById('modal-img-wrap');
  galleryImages = p.images && p.images.length ? p.images : (p.image ? [p.image] : []);
  galleryIndex = 0;
  if (galleryImages.length) {
    imgWrap.style.display = 'block';
    gallerySetIndex(0);
  } else {
    imgWrap.style.display = 'none';
  }

  document.getElementById('modal-status-badge').textContent = p.status;
  document.getElementById('modal-status-badge').className = `badge ${statusBadgeClass(p.status)}`;
  document.getElementById('modal-type-badge').textContent = p.type;
  document.getElementById('modal-title').textContent = p.titleEn;
  document.getElementById('modal-shop-link').href = safeUrl(p.url);

  const talentsEl = document.getElementById('modal-talents');
  talentsEl.innerHTML = p.talents.map(t =>
    `<span class="modal-talent-tag" style="background:${esc(t.color)}30;color:${esc(tagTextColor(t.color))};border-color:${esc(t.color)}66">${esc(t.name)}</span>`
  ).join('');

  const priceEl = document.getElementById('modal-price');
  if (p.minPrice) {
    const hasRange = p.minPrice !== p.maxPrice && p.maxPrice > 0;
    const jpyStr = hasRange
      ? `${fmtJpy(p.minPrice)} – ${fmtJpy(p.maxPrice)}`
      : fmtJpy(p.minPrice);
    const usdStr = usdPerJpy
      ? (hasRange ? `(${fmtUsd(p.minPrice)} – ${fmtUsd(p.maxPrice)})` : `(${fmtUsd(p.minPrice)})`)
      : '';
    priceEl.innerHTML = `<span class="modal-price-jpy">${jpyStr}</span>${usdStr ? `<span class="modal-price-usd">${usdStr}</span>` : ''}`;
  } else {
    priceEl.innerHTML = '';
  }

  refreshModalButtons();

  // Drop timer in modal
  const modalTimerEl = document.getElementById('modal-drop-timer');
  if (p.publishedAt) {
    modalTimerEl.style.display = 'flex';
    modalTimerEl.dataset.ts = p._sortTs;
    tickModalTimer();
  } else {
    modalTimerEl.style.display = 'none';
  }

  document.getElementById('modal-overlay').classList.remove('hidden');
}

function refreshModalButtons() {
  const inWL  = userData.wishlist.includes(modalProductId);
  const inOWN = userData.owned.includes(modalProductId);
  const wlBtn = document.getElementById('modal-wl-btn');
  const owBtn = document.getElementById('modal-ow-btn');
  wlBtn.textContent = inWL ? '★ Wishlisted' : '☆ Wishlist';
  wlBtn.className = `modal-action-btn ${inWL ? 'modal-wishlist-on' : 'modal-wishlist-off'}`;
  owBtn.textContent = inOWN ? '✓ Owned' : '+ Own';
  owBtn.className = `modal-action-btn ${inOWN ? 'modal-owned-on' : 'modal-owned-off'}`;
}

function gallerySetIndex(idx) {
  galleryIndex = Math.max(0, Math.min(idx, galleryImages.length - 1));
  document.getElementById('modal-img').src = safeUrl(galleryImages[galleryIndex]);

  // Arrows
  const prev = document.getElementById('gallery-prev');
  const next = document.getElementById('gallery-next');
  if (prev) prev.disabled = galleryIndex === 0;
  if (next) next.disabled = galleryIndex === galleryImages.length - 1;
  // Hide arrows if only one image
  const show = galleryImages.length > 1;
  if (prev) prev.style.display = show ? 'flex' : 'none';
  if (next) next.style.display = show ? 'flex' : 'none';

  // Dots
  const dotsEl = document.getElementById('gallery-dots');
  if (dotsEl) {
    if (galleryImages.length > 1) {
      dotsEl.innerHTML = galleryImages.map((_, i) =>
        `<button class="gallery-dot${i === galleryIndex ? ' active' : ''}" onclick="gallerySetIndex(${i})"></button>`
      ).join('');
    } else {
      dotsEl.innerHTML = '';
    }
  }
}

function galleryStep(dir) {
  gallerySetIndex(galleryIndex + dir);
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = safeUrl(src);
  document.getElementById('lightbox').classList.remove('hidden');
}

function closeLightbox(e) {
  if (!e || e.target !== document.getElementById('lightbox-img')) {
    document.getElementById('lightbox').classList.add('hidden');
    document.getElementById('lightbox-img').src = '';
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.add('hidden');
    modalProductId = null;
  }
}

function modalToggleWishlist() { if (modalProductId) toggleWishlist(modalProductId); }

// Keyboard gallery nav
document.addEventListener('keydown', e => {
  if (document.getElementById('modal-overlay').classList.contains('hidden')) return;
  if (e.key === 'ArrowLeft')  galleryStep(-1);
  if (e.key === 'ArrowRight') galleryStep(1);
  if (e.key === 'Escape') {
    document.getElementById('lightbox').classList.add('hidden');
    document.getElementById('modal-overlay').classList.add('hidden');
  }
});
function modalToggleOwned()    { if (modalProductId) toggleOwned(modalProductId); }

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  render();
}

// ── Talent filter ─────────────────────────────────────────────────────────────
function setTalentFilter(id) {
  activeTalent = id;
  document.getElementById('all-talent-btn').classList.toggle('active', !id);
  const t = id ? TALENTS.find(x => x.id === id) : null;
  document.querySelectorAll('.talent-btn').forEach(btn => {
    const isMatch = id && btn.dataset.talentId === id;
    btn.classList.toggle('active', isMatch);
    if (isMatch && t) {
      btn.style.color = t.color;
      btn.style.background = t.color + '18';
    } else {
      btn.style.color = '';
      btn.style.background = '';
    }
  });
  render();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.add('hidden'), 2500);
}

// ── Drop timers ───────────────────────────────────────────────────────────────
const ONE_WEEK_MS = 7 * 24 * 60 * 60 * 1000;
const _pad2 = n => String(n).padStart(2, '0');

function timerHTML(droppedTs, isModal) {
  const elapsed = Date.now() - droppedTs;
  if (elapsed < 0) return '';

  const totalSec = Math.floor(elapsed / 1000);
  const d = Math.floor(totalSec / 86400);
  const h = Math.floor((totalSec % 86400) / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;

  // Items < 1 week old: show live count-up ticker with "Released" prefix
  // Items >= 1 week old: show human-readable "Released X ago"
  if (elapsed < ONE_WEEK_MS) {
    if (isModal) {
      const segs = d > 0
        ? [['D', d], ['H', h], ['M', m], ['S', s]]
        : [['H', h], ['M', m], ['S', s]];
      return `<div class="modal-tsegs">${
          segs.map(([lbl, val], i) =>
            `${i > 0 ? '<span class="modal-tsep">:</span>' : ''}` +
            `<div class="modal-tseg"><span class="tseg-val">${_pad2(val)}</span><span class="tseg-lbl">${lbl}</span></div>`
          ).join('')
        }</div>`;
    } else {
      const parts = d > 0
        ? [[d,'d'],[h,'h'],[m,'m'],[s,'s']]
        : [[h,'h'],[m,'m'],[s,'s']];
      return `<div class="timer-live">${
          parts.map(([val, lbl]) =>
            `<span class="tv">${d > 0 && lbl === 'd' ? val : _pad2(val)}</span><span class="tl">${lbl}</span>`
          ).join('')
        }</div>`;
    }
  }

  // Older items: human-readable "X ago"
  function agoText(long) {
    if (d >= 365) {
      const yrs = Math.floor(d / 365), rem = d % 365;
      if (long) return rem > 0 ? `${yrs}y ${rem}d ago` : `${yrs} year${yrs !== 1 ? 's' : ''} ago`;
      return rem > 0 ? `${yrs}y ${rem}d ago` : `${yrs}y ago`;
    }
    if (d >= 1)  return long ? `${d} day${d !== 1 ? 's' : ''} ago`    : `${d}d ago`;
    if (h >= 1)  return long ? `${h} hour${h !== 1 ? 's' : ''} ago`   : `${h}h ago`;
    if (m >= 1)  return long ? `${m} minute${m !== 1 ? 's' : ''} ago` : `${m}m ago`;
    return long ? `${s} second${s !== 1 ? 's' : ''} ago` : `${s}s ago`;
  }

  if (isModal) {
    return `<div class="modal-timer-days">Released <b>${agoText(true)}</b></div>`;
  } else {
    return `<div class="timer-days"><b>${agoText(false)}</b></div>`;
  }
}

function tickAllTimers() {
  for (let i = 0; i < _timerEls.length; i++) {
    _timerEls[i].inner.innerHTML = timerHTML(_timerEls[i].ts, false);
  }
  tickModalTimer();
}

function tickModalTimer() {
  const el = document.getElementById('modal-drop-timer');
  if (!el || el.style.display === 'none' || !el.dataset.ts) return;
  const inner = document.getElementById('modal-timer-inner');
  if (inner) inner.innerHTML = timerHTML(+el.dataset.ts, true);
}

// Tick every second
setInterval(tickAllTimers, 1000);

// ── Sidebar toggle ──────────────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const isMobile = window.innerWidth <= 768;
  if (isMobile) {
    const opening = !sidebar.classList.contains('mobile-open');
    sidebar.classList.remove('collapsed');
    sidebar.classList.toggle('mobile-open', opening);
    overlay.classList.toggle('visible', opening);
  } else {
    sidebar.classList.remove('mobile-open');
    sidebar.classList.toggle('collapsed');
  }
}

// ── Scroll to top ───────────────────────────────────────────────────────────
function scrollToTop() {
  document.getElementById('grid-container').scrollTo({ top: 0, behavior: 'smooth' });
}
let _scrollTick = false;
const _gridContainer = document.getElementById('grid-container');
const _scrollTopBtn = document.getElementById('scroll-top');
_gridContainer.addEventListener('scroll', function() {
  if (_scrollTick) return;
  _scrollTick = true;
  requestAnimationFrame(() => {
    _scrollTopBtn.classList.toggle('visible', _gridContainer.scrollTop > 300);
    if (_rendered < _filtered.length) {
      const { scrollTop, scrollHeight, clientHeight } = _gridContainer;
      if (scrollTop + clientHeight >= scrollHeight - 600) _loadMore();
    }
    _scrollTick = false;
  });
});

// ── Grid density ────────────────────────────────────────────────────────────
let gridDensity = 'normal';
function setDensity(mode) {
  gridDensity = mode;
  document.getElementById('grid').classList.toggle('compact', mode === 'compact');
  document.querySelectorAll('.density-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.density === mode);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadUserData();
loadProducts();

// ── PWA Service Worker ───────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
